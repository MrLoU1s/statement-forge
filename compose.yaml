services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=statementforge'
      - 'POSTGRES_USER=sf'
      - 'POSTGRES_PASSWORD=sf'
    ports:
      - '5432:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sf -d statementforge']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
