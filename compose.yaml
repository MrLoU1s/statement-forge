services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=statementforge'
      - 'POSTGRES_USER=sf'
      - 'POSTGRES_PASSWORD=sf'
    ports:
      # Host port 5433, not the default 5432: a native PostgreSQL 18 Windows
      # service already owns 5432 on this machine. Keep application.yaml's
      # datasource URL in sync with this port.
      - '5433:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sf -d statementforge']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
