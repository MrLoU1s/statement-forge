services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=statementforge'
      - 'POSTGRES_USER=sf'
      - 'POSTGRES_PASSWORD=sf'
    ports:
      # Host port 5433, not the default 5432: a native PostgreSQL 18 Windows
      # service already owns 5432 on this machine. Keep application.yaml's
      # datasource URL in sync with this port.
      - '5433:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sf -d statementforge']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      # Container-to-container: the "postgres" service name on its container
      # port 5432 - the 5433 host mapping above is a host-only convenience and
      # doesn't apply inside the compose network. reWriteBatchedInserts=true
      # carried over from application.yaml (M7).
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/statementforge?reWriteBatchedInserts=true'
    labels:
      # Stops the local `mvnw spring-boot:run` dev loop (spring-boot-docker-compose)
      # from also trying to manage/connect to this container.
      - 'org.springframework.boot.ignore=true'

volumes:
  pgdata:
